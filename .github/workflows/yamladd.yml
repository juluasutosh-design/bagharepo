name: Add Yaml

run-name: Add Yaml - ${{ inputs.yaml || inputs.custom_yaml || inputs.value_yaml }}

on:
  workflow_dispatch:
    inputs:
      yaml:
        type: string
        description: Provide Yaml structure to be add , Please note top hierchy is set as niq-deploy
      custom_yaml:
        type: string
        description: Provide your custom structure
      value_yaml:
        type: string
        description: Provide a value which you want to override in yaml file
      files:
        type: choice
        description: structure/value to be added to yaml file
        options:
          - 'usuat'
          - 'euuat'
          - 'euuat,usuat'
          - 'ushofix'
          - 'usprod,euprod'
          - 'calatamprod,apacprod'
          - 'usprod,euprod,calatamprod,apacprod'
  
jobs:
  checkout:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

  Node:
    needs: checkout
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v6

  env_param:
   runs-on: ubuntu-latest
   needs: Node
   steps:
     - name: setting env param
       id: param
       run:  |
         IFS=',' 
         read -ra envArray <<< "${{ github.event.inputs.files }}"
         echo "myArray=$envArray" >> $GITHUB_OUTPUTS
     - name: Run script
       run:  |
         git clone https://github.com/juluasutosh-design/bagharepo.git
         cd bagharepo
         node app.js "${{ steps.param.outputs.myArray }}"

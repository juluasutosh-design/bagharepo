name: One click Commit

on:
  workflow_dispatch:
    inputs:
      OverrideYaml:
        description: 'Provide override yaml to update. Used for appending new configs and overriding existing values.'
        required: true
        default: |
            global:
              env: uat
      environment_files:
        description: 'Provide environment specific yaml file name'
        type: choice
        required: true
        options:
          - 'usuat'
          - 'euuat'
          - 'usuat,euuat'
        default: 'usuat'
      config_file_Type:
        description: 'Provide the Type of yaml file to be updated i.e cname or deploy'
        type: choice
        required: true
        options:
          - 'cname'
          - 'deploy'        
jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.MYSECRET }}

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install yaml

      - name: Run the patching script
        # Pass OverrideYaml as an env var so multiline newlines are preserved.
        env:
          OVERRIDE_YAML: ${{ github.event.inputs.OverrideYaml }}
          ENVIRONMENT_FILES: ${{ github.event.inputs.environment_files }}
          CONFIG_FILE_TYPE: ${{ github.event.inputs.config_file_Type }}
        run: node app.js

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Updated yaml files ${{ github.event.inputs.environment_files }} with provided override by ${{ github.actor }}"
          git push

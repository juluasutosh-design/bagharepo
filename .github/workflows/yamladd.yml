name: One click Commit

on:
  workflow_dispatch:
    inputs:
      OverrideYaml:
        description: 'Provide path-based override input, e.g. region~[europe]~dns~julu.com;'
        required: true
        default: 'region~[europe]~dns~julu.com'
      Release:
        description: 'Select Release , Used to create branch with name and also used in PR title'
        type: choice
        required: true
        options:
          - 2026-JAN-I
          - 2026-JAN-II
          - 2026-FEB-I
          - 2026-FEB-II
          - 2026-MAR-I
          - 2026-MAR-II
          - 2026-APR-I
          - 2026-APR-II
          - 2026-MAY-I
          - 2026-MAY-II
          - 2026-MAY-III
          - 2026-JUN-I
          - 2026-JUN-II
          - 2026-JUL-I
          - 2026-JUL-II
          - 2026-AUG-I
          - 2026-AUG-II
          - 2026-SEP-I
          - 2026-SEP-II
          - 2026-OCT-I
          - 2026-OCT-II
          - 2026-OCT-III
          - 2026-NOV-I
          - 2026-NOV-II
          - 2026-DEC-I
          - 2026-DEC-II            
      environment_files:
        description: 'Provide environment specific yaml file name'
        type: choice
        required: true
        options:
          - 'usuat'
          - 'euuat'
          - 'usuat,euuat'
        default: 'usuat'
      config_file_Type:
        description: 'Provide the Type of yaml file to be updated i.e cname or deploy'
        type: choice
        required: true
        options:
          - 'cname'
          - 'deploy'
jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.MYSECRET }}
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install yaml

      - name: Run the patching script
        # Pass OverrideYaml as an env var so multiline newlines are preserved.
        env:   
          OVERRIDE_YAML: ${{ github.event.inputs.OverrideYaml }}
          ENVIRONMENT_FILES: ${{ github.event.inputs.environment_files }}
          CONFIG_FILE_TYPE: ${{ github.event.inputs.config_file_Type }}
        run: node app.js
      - name: Commit and Push changes_1
        run: |
          git checkout -b feature/update-yaml-files-${{ github.event.inputs.Release }}
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --quiet; then
            git commit -m "chore(ci):Updated yaml files ${{ github.event.inputs.environment_files }} with provided override by ${{ github.actor }} in release ${{ github.event.inputs.Release }}"
            git push --set-upstream origin feature/update-yaml-files-${{ github.event.inputs.Release }}
          else
            echo "No changes to commit"
          fi  
      - name: Compare the changes
        run:  |
      - name: Compare the changes
        run:  |
         if [ ${{ github.event.inputs.config_file_Type }} == "cname" ]; then
           echo "Setting compare file for cname"
           echo "dest=./deployment/aks/chart/cname/values.yaml" >> $GITHUB_ENV
         elif [ ${{ github.event.inputs.config_file_Type }} == "deploy" ]; then
            echo "Setting compare file for deploy"
            echo "dest=./deployment/aks/chart/values.yaml" >> $GITHUB_ENV
         fi
         echo "Input Override Yaml: ${{ github.event.inputs.OverrideYaml }}"
         IFS=';' read -ra OVERRIDE_ARRAY <<< "${{ github.event.inputs.OverrideYaml }}"
         for item in "${OVERRIDE_ARRAY[@]}"; do
            if [[ -z "$item" ]]; then
              continue
            fi
            echo "Extracting key path by removing the value part"            
            item="${item%~*}"
            echo "Key path after removing the value: $item"             
            if [[ "$item" == *"~"* ]]; then
              echo "Key path contains ~, replacing with ."
              item=$(echo ${item} | sed 's/~/\./g')
            else
              echo "Key path does not contain ~, no replacement needed"
            fi
            echo "Item after replacing ~ with . : $item"
            echo "Checking if Key exists in Afterconfig.yml"
            IFS=',' read -ra typeArray <<< "${{ github.event.inputs.config_file_Type }}"
            for type in "${typeArray[@]}"; do
                if [[ "$type" == "cname" ]]; then
                  YAML_FILE="./deployment/aks/chart/cname/values.yaml"
                  root=julu-cname
                elif [[ "$type" == "deploy" ]]; then
                  YAML_FILE="./deployment/aks/chart/values.yaml"
                  root=julu-deploy
                fi
                echo "Comparing the key path with the YAML file: $YAML_FILE"
                if ROOT_KEY="$root" MY_PATH="$item" yq -e '
                  # 1. Determine if the path contains brackets
                  if (env(MY_PATH) | test("\[.*?\]")) then
                    # Format contains brackets: convert "a.[b].c" -> "a.*.b.c"
                    (env(MY_PATH) | gsub("\\[(.*?)\\]"; "*.$1")) as $clean_path
                    
                    | eval("." + env(ROOT_KEY) + "." + $clean_path)
                  else
                    # Format is a normal dot path: evaluate ".k.a.b.c" directly
                    eval("." + env(ROOT_KEY) + "." + env(MY_PATH))
                  end
                  # 2. Drop nulls to enforce validation
                  | select(. != null)
                  ' "$YAML_FILE" > /dev/null 2>&1; then
                  echo "Path exists in the YAML file!"
                  else
                    echo "Path does not exist or structure is broken."
                    exit 1
                  fi
            done
         done
      - name: fetch name
        run:  |
          if [[ "${{ github.event.inputs.environment_files }}" == "*uat*" ]]; then
            echo "envs=$(echo uat)" >> $GITHUB_ENV
          elif [[ "${{ github.event.inputs.environment_files }}" == "*prod*" ]]; then
            echo "envs=$(echo prod)" >> $GITHUB_ENV
          fi  
      - name: Commit and Push changes
        run: |
          git checkout -b feature/update-${{ env.envs }}-yaml-files-${{ github.event.inputs.Release }}
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --quiet; then
            git commit -m "chore(ci):Updated yaml files ${{ github.event.inputs.environment_files }} with provided override by ${{ github.actor }} in release ${{ github.event.inputs.Release }}"
            git push --set-upstream origin feature/update-${{ env.envs }}-yaml-files-${{ github.event.inputs.Release }}
          else
            echo "No changes to commit"
          fi  
      - name: Create PR
        env:
          GH_TOKEN: ${{ secrets.MYSECRET }}
        run:  |
          gh pr create --title "chore(ci): Update yaml files ${{ github.event.inputs.environment_files }}" --body "This PR updates the yaml files with the provided override values by ${{ github.actor }}." --base ${{ github.ref }} --head feature/update-${{ env.envs }}-yaml-files-${{ github.event.inputs.Release }} --reviewer ${{ github.actor}}

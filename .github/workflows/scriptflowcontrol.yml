name: script-executor


on:
  workflow_dispatch:
    inputs:
      Select:
        description: "Provide Scripts which need to be ignored during execution"
        type: boolean
        default: false
      Preview:
        description: "scipt"
        type: boolean
        default: false
      Preview_2:
        description: "scipt_2"
        type: boolean
        default: false  
jobs:
      
  Select:
    if: ${{ inputs.Select && !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          token: ${{ secrets.MYSECRET }}
      - name: configure
        run:  |
          ls -l
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git branch
          echo "I am bagha" >> myfile.txt
          git add .
          git commit -m "added bagha file"
          git push origin 
      - name: print
        run:  |
          for i in "${array[@]}"
            do
              echo $i
            done  
      - name: echo
        run:  |
          echo -e "\e[31>mSelect ran\e[0m"


  Preview_step1:
    needs:  [ Select] 
    if: ${{ inputs.Preview && (needs.Select.result == 'success' || needs.Select.result == 'skipped') && !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - name: echo
        run:  |
          echo -e "\e[32>mSelect ran\e[0m"
          sleep 40000          
  Preview_step2:
    needs:  [ Preview_step1] 
    if: ${{ inputs.Preview_2 && (needs.Preview_step1.result == 'success' || needs.Preview_step1.result == 'skipped') && !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - name: echo
        run:  |
             echo "${{ inputs.Preview_2 && (needs.Preview_step1.result == 'success' || needs.Preview_step1.result == 'skipped') }}"
             echo "${{ inputs.Preview_2}}"
             echo "${{ needs.Preview_step1.result == 'success'}}"
             echo "${{ needs.Preview_step1.result == 'skipped' }}"

             
  mail_success:
    needs: [Select,Preview_step1,Preview_step2]
    runs-on: ubuntu-latest
    if:  |
        (needs.Select.result == 'success' || needs.Select.result == 'skipped') &&
        (needs.Preview_step1.result == 'success' || needs.Preview_step1.result == 'skipped') &&
        (needs.Preview_step2.result == 'success' || needs.Preview_step2.result == 'skipped') && !cancelled()
    steps:
      - name: echo new
        run:  |
          echo new
  mail_failure:
    needs: [Preview_step1,Select,Preview_step2]
    runs-on: ubuntu-latest
    if: failure() || cancelled()
    steps:
      - name: echo mail
        run:  |
          echo "sending mail"          

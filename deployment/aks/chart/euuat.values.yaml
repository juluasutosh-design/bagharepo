julu-deploy:
  env:
    # -- Environment for the application
    prouat
  region:
    dnsZone: "azure-julu-np.net.com.eu"
    app: 12.5.12
    version: 5.7.9
    pdb:
      minAvailable:
        # -- Enable minAvailable pdb for application
        enabled: true
        # -- minAvailable value for pdb
        value: 1
      maxUnavailable:
        # -- Enable maxUnavailable pdb for application
        enabled: true
        # -- maxUnavailable value for pdb
        value: 2
      # -- Application name updated
      appName: Appname-version.1
  podResources:
    requests:
      cpu: 8
  scaledobject:
    enabled: true
    triggers:
      metadata:
        query: (avg:jvm.thread_count{env:dd-env, service:dd-service, market:dd-market,
          version:dd-version, kube_cluster_name:dd-cluster} - 60)

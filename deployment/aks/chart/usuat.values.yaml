julu-deploy:
  env:
    # -- Environment for the application
    uat
  region:
    dnsZone: "azure-julu-np.net.com.eu"
    app: 12.5.13
    version: 5.7.9
    pdb:
      minAvailable:
        # -- Enable minAvailable pdb for application
        enabled: true
        # -- minAvailable value for pdb
        value: 1
      maxUnavailable:
        # -- Enable maxUnavailable pdb for application
        enabled: true
        # -- maxUnavailable value for pdb
        value: 2
      # -- Application name updated
      appName: Appname-version.1
  app: 12.5.13
  version: 2.011.5
  pdb:
    minAvailable:
      # -- Enable minAvailable pdb for application
      enabled:
        - false
        - true
      # -- minAvailable value for pdb
      value: 1
    maxUnavailable:
      # -- Enable maxUnavailable pdb for application
      enabled: false
      # -- maxUnavailable value for pdb
      value: 1
  # -- Application name
  appName: commitapp
  podResources:
    requests:
      cpu: 1
